name: Build and Test

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: "20.19.4"
  TEST_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/watchloom_test"
  JWT_SECRET: "watchloom-ci-test-secret"
  NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3100"
  TMDB_API_KEY: "dummy-key"
  TMDB_API_TOKEN: "dummy-token"
  TMDB_API_READ_ACCESS_TOKEN: "dummy-read-token"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, Lint, Unit Tests, Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watchloom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d watchloom_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck web
        working-directory: ./watchloom-web
        run: npx tsc --noEmit

      - name: Typecheck shared
        run: npm run typecheck --workspace watchloom-shared

      - name: Lint web
        run: npm run lint --workspace watchloom-web

      - name: Unit tests
        run: npm run test --workspace watchloom-web -- --runInBand

      - name: Migrate build database
        working-directory: ./watchloom-web
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: npm run db:migrate

      - name: Build web app
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: npm run build --workspace watchloom-web

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watchloom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d watchloom_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        working-directory: ./watchloom-web
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: npm run test:integration -- --runInBand

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: watchloom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d watchloom_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./watchloom-web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ./watchloom-web
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          WATCHLOOM_ALLOW_TEST_DATABASE_AS_DATABASE_URL: "true"
        run: npm run test:e2e
